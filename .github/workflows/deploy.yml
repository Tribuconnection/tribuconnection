name: Deploy a Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Subir por FTP a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Carpeta raíz del sitio en Hostinger. Normalmente /public_html/.
          # Si el dominio es "addon", suele ser /domains/tribuconnection.com/public_html/
          server-dir: /public_html/
          # Solo se sube el contenido del sitio (la carpeta con index.html y assets)
          local-dir: ./tribu-landing/
          exclude: |
            **/LEEME.txt
